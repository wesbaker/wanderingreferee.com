name: hugo-pr-check

on:
  pull_request:
  workflow_dispatch:

jobs:
  hugo-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.160.1"
          extended: true

      - name: Verify site builds cleanly
        run: hugo --baseURL https://wanderingreferee.com --panicOnWarning
