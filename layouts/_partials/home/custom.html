<div class="flex flex-col lg:flex-row">
  <div class="grow min-w-0">
    {{ partial "recent-articles.html" . }}
  </div>
  <aside class="mt-8 lg:mt-0 lg:max-w-xs shrink-0 lg:ps-8">
    <div class="prose prose-sm dark:prose-invert">
      {{ .Content | emojify }}
    </div>
    {{ with .Site.Taxonomies.tags }}
      <div class="mt-8">
        <h3 class="text-sm font-semibold uppercase tracking-wide text-neutral-500 dark:text-neutral-400 mb-2">Tags</h3>
        <ul class="sidebar-tags flex flex-wrap text-xs leading-relaxed text-neutral-500 dark:text-neutral-400 list-none p-0 m-0">
          {{ range $name, $pages := . }}
            <li>
              <a
                href="{{ "/tags/" | relLangURL }}{{ $name | urlize }}/"
                class="rounded-md border border-neutral-200 px-1 py-[1px] hover:border-primary-300 hover:text-primary-700 dark:border-neutral-600 dark:hover:border-primary-600 dark:hover:text-primary-400"
              >{{ $name }}</a>
            </li>
          {{ end }}
        </ul>
      </div>
    {{ end }}
    <div class="mt-8">
      {{ partialCached "author-links.html" . }}
    </div>
  </aside>
</div>
